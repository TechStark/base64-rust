name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: b64-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: b64-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: b64-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (macOS)
        if: runner.os == 'macOS'
        run: cp target/${{ matrix.target }}/release/b64 ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item target/${{ matrix.target }}/release/b64.exe ${{ matrix.asset_name }}
        shell: pwsh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
