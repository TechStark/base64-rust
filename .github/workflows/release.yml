name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: b64-macos-x86_64.tar.gz
            binary_name: b64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: b64-macos-aarch64.tar.gz
            binary_name: b64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: b64-windows-x86_64.tar.gz
            binary_name: b64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          chmod +x target/${{ matrix.target }}/release/b64
          cp target/${{ matrix.target }}/release/b64 b64
          tar -czf ${{ matrix.asset_name }} b64

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item target/${{ matrix.target }}/release/b64.exe b64.exe
          tar -czf ${{ matrix.asset_name }} b64.exe
        shell: pwsh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
